name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    name: Dependency & Code Security Scan

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit semgrep
          pip install -e ".[dev]" || true

      - name: Run pip-audit (dependencies)
        run: |
          pip-audit --desc --skip-editable
        continue-on-error: true

      - name: Run bandit (code)
        run: |
          bandit -r blutruth/ -f json -o bandit-report.json || true
          cat bandit-report.json
        continue-on-error: true

      - name: Run semgrep (patterns)
        run: |
          semgrep --config=p/security-audit --json -o semgrep-report.json blutruth/
          cat semgrep-report.json
        continue-on-error: true

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    name: Build & Verify Distribution
    needs: scan

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: |
          python -m build --outdir dist/

      - name: Verify distribution contents
        run: |
          twine check dist/*

      - name: Generate hashes
        run: |
          cd dist/
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: distributions
          path: dist/
          retention-days: 30
